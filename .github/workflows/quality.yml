name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-type-test:
    name: Lint, Type, Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy ductor_bot

      - name: Pytest
        run: pytest -q

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit pip-audit

      - name: Bandit (report)
        continue-on-error: true
        run: bandit -q -r ductor_bot -x ductor_bot/_home_defaults

      - name: pip-audit
        run: pip-audit
