pre-commit:
  parallel: true
  commands:
    ruff-check:
      glob: "*.py"
      run: uv run ruff check {staged_files}
    ruff-format:
      glob: "*.py"
      run: uv run ruff format --check {staged_files}
    mypy:
      glob: "*.py"
      run: uv run mypy {staged_files}

pre-push:
  commands:
    tests:
      run: uv run pytest -x -q
